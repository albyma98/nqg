services:
  api:
    build:
      context: .
      target: api
      args:
        API_BASE_URL: https://${API_DOMAIN}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-file:./data/prod.db}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_BOOTSTRAP_EMAIL: ${ADMIN_BOOTSTRAP_EMAIL}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD}
      ADMIN_AUTH_DISABLED: ${ADMIN_AUTH_DISABLED:-false}
      PORT: 3001
      HTTPS_ENABLED: "false"
      GENERATION_DAILY_LIMIT: ${GENERATION_DAILY_LIMIT:-20}
      GENERATION_CONCURRENT_LIMIT: ${GENERATION_CONCURRENT_LIMIT:-3}
      GENERATION_CONFIRM_COST_THRESHOLD_USD: ${GENERATION_CONFIRM_COST_THRESHOLD_USD:-0.5}
    volumes:
      - nightquest_data:/app/server/data
    expose:
      - "3001"

  api-init:
    build:
      context: .
      target: api
      args:
        API_BASE_URL: https://${API_DOMAIN}
    profiles:
      - init
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-file:./data/prod.db}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_BOOTSTRAP_EMAIL: ${ADMIN_BOOTSTRAP_EMAIL}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD}
      ADMIN_AUTH_DISABLED: ${ADMIN_AUTH_DISABLED:-false}
      PORT: 3001
      HTTPS_ENABLED: "false"
    volumes:
      - nightquest_data:/app/server/data
    entrypoint: ["sh", "-lc", "npm run prisma:migrate && npm run prisma:seed"]

  caddy:
    build:
      context: .
      target: caddy
      args:
        API_BASE_URL: https://${API_DOMAIN}
    restart: unless-stopped
    depends_on:
      - api
    environment:
      ACME_EMAIL: ${ACME_EMAIL}
      WEB_DOMAIN: ${WEB_DOMAIN}
      ADMIN_DOMAIN: ${ADMIN_DOMAIN}
      API_DOMAIN: ${API_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  nightquest_data:
  caddy_data:
  caddy_config:
